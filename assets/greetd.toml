[terminal]
# The VT to run the greeter on. Can be "next", "current" or a number
# designating the VT.
vt = 1

[default_session]
# Start post-install service via systemctl, then continue with greeter
command = "systemctl start sparrow-post-install.service; dms-greeter --command Hyprland"

# The user to run the command as. The privileges this user must have depends
# on the greeter. A graphical greeter may for example require the user to be
# in the `video` group
user = "greetd"
