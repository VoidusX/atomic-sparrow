---
name: Build Sparrow (Preview)

on:
  release:
    types:
      - prereleased

concurrency:
  group: ${{ github.workflow }}-${{ github.ref || github.run_id }}
  cancel-in-progress: true

jobs:
  build:
    uses: ./.github/workflows/reusable-build.yml
    secrets: inherit
    with:
      image-name: "${{ github.event.repository.name }}"
      image-tag: "${{ github.event.release.tag_name }}"
      image-desc: "A hyprland atomic-based image at minimal scale."
      image-keywords: "bootc,arch,archlinux,sparrow,hyprland"
      image-logo: "https://avatars.githubusercontent.com/u/47302555?s=400&u=cb912a5db49aee164a609a0fb4967d2d8170feb9&v=4"
      platforms: amd64
      rechunk: true
      publish: true

  build-iso:
    uses: ./.github/workflows/reusable-disk-build.yml
    secrets: inherit
    needs: [build]
    with:
      image-name: "${{ github.event.repository.name }}"
      image-tag: "${{ github.event.release.tag_name }}"
      disk-type: "iso"
      platform: "amd64"
      upload-to-release: true

  build-qcow:
    uses: ./.github/workflows/reusable-disk-build.yml
    secrets: inherit
    needs: [build]
    with:
      image-name: "${{ github.event.repository.name }}"
      image-tag: "${{ github.event.release.tag_name }}"
      disk-type: "qcow"
      platform: "amd64"
      upload-to-release: true

  update-preview-tag:
    name: Update preview tags
    needs: [build, build-iso, build-qcow]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Update preview tags
        uses: actions/github-script@v7
        with:
          script: |
            const release = context.payload.release;
            const tagName = release.tag_name;

            // Extract version from tag (e.g., v0.8.0-alpha.1 -> 0.8)
            const versionMatch = tagName.match(/^v(\d+\.\d+)/);
            if (!versionMatch) {
              core.warning(`Tag ${tagName} does not match version pattern`);
              return;
            }
            const version = versionMatch[1];

            // Create major.minor tag for pinning (preview_X.Y)
            const previewTag = `preview_${version}`;

            try {
              // Try to update existing tag
              await github.rest.git.updateRef({
                owner: context.repo.owner,
                repo: context.repo.repo,
                ref: `tags/${previewTag}`,
                sha: release.target_commitish,
                force: true
              });
              console.log(`Updated ${previewTag} to ${tagName}`);
            } catch (err) {
              if (err.status === 422) {
                // Create new tag
                await github.rest.git.createRef({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  ref: `refs/tags/${previewTag}`,
                  sha: release.target_commitish
                });
                console.log(`Created ${previewTag} pointing to ${tagName}`);
              } else {
                throw err;
              }
            }

            // Get all prerelease tags
            const { data: releases } = await github.rest.repos.listReleases({
              owner: context.repo.owner,
              repo: context.repo.repo,
              per_page: 100
            });

            // Filter and sort prereleases by semver
            const prereleases = releases
              .filter(r => r.prerelease)
              .sort((a, b) => {
                const aVer = a.tag_name.replace('v', '').split('.').map(Number);
                const bVer = b.tag_name.replace('v', '').split('.').map(Number);
                for (let i = 0; i < 3; i++) {
                  if (aVer[i] !== bVer[i]) return bVer[i] - aVer[i];
                }
                return 0;
              });

            const latestPrerelease = prereleases[0];
            if (!latestPrerelease) {
              // Cannot fall back to unstable - latest-preview must not be set
              core.warning('No pre-releases exist, latest-preview will not be updated.');
              return;
            }

            // Update latest-preview tag
            try {
              await github.rest.git.updateRef({
                owner: context.repo.owner,
                repo: context.repo.repo,
                ref: 'tags/latest-preview',
                sha: latestPrerelease.target_commitish,
                force: true
              });
              console.log(`Updated 'latest-preview' to ${latestPrerelease.tag_name}`);
            } catch (err) {
              if (err.status === 422) {
                await github.rest.git.createRef({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  ref: 'refs/tags/latest-preview',
                  sha: latestPrerelease.target_commitish
                });
                console.log(`Created 'latest-preview' tag pointing to ${latestPrerelease.tag_name}`);
              } else {
                throw err;
              }
            }
