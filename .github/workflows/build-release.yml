---
name: Build Sparrow (Release)

on:
  release:
    types:
      - published

concurrency:
  group: ${{ github.workflow }}-${{ github.ref || github.run_id }}
  cancel-in-progress: true

jobs:
  build:
    if: ${{ !github.event.release.prerelease }}
    uses: ./.github/workflows/reusable-build.yml
    secrets: inherit
    with:
      image-name: "${{ github.event.repository.name }}"
      image-tag: "${{ github.event.release.tag_name }}"
      image-desc: "A hyprland atomic-based image at minimal scale."
      image-keywords: "bootc,arch,archlinux,sparrow,hyprland"
      image-logo: "https://avatars.githubusercontent.com/u/47302555?s=400&u=cb912a5db49aee164a609a0fb4967d2d8170feb9&v=4"
      platforms: amd64
      rechunk: true
      publish: true

  build-iso:
    if: ${{ !github.event.release.prerelease }}
    uses: ./.github/workflows/reusable-disk-build.yml
    secrets: inherit
    needs: [build]
    with:
      image-name: "${{ github.event.repository.name }}"
      image-tag: "${{ github.event.release.tag_name }}"
      disk-type: "iso"
      platform: "amd64"
      upload-to-release: true

  build-qcow:
    if: ${{ !github.event.release.prerelease }}
    uses: ./.github/workflows/reusable-disk-build.yml
    secrets: inherit
    needs: [build]
    with:
      image-name: "${{ github.event.repository.name }}"
      image-tag: "${{ github.event.release.tag_name }}"
      disk-type: "qcow"
      platform: "amd64"
      upload-to-release: true

  latest-tag:
    name: Update latest and stable tags
    needs: [build, build-iso, build-qcow]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Update tags
        uses: actions/github-script@a26ff4c5d049a9d0fb9505415b51cf05c01e2f93 # v7
        with:
          script: |
            const release = context.payload.release;
            const tagName = release.tag_name;

            // Extract version from tag (e.g., v0.10.5 -> 0.10)
            const versionMatch = tagName.match(/^v(\d+\.\d+)/);
            if (!versionMatch) {
              core.warning(`Tag ${tagName} does not match version pattern`);
              return;
            }
            const majorMinor = versionMatch[1];

            // Create major.minor tag for pinning (e.g., 0.10)
            try {
              await github.rest.git.updateRef({
                owner: context.repo.owner,
                repo: context.repo.repo,
                ref: `tags/${majorMinor}`,
                sha: release.target_commitish,
                force: true
              });
              console.log(`Updated ${majorMinor} to ${tagName}`);
            } catch (err) {
              if (err.status === 422) {
                await github.rest.git.createRef({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  ref: `refs/tags/${majorMinor}`,
                  sha: release.target_commitish
                });
                console.log(`Created ${majorMinor} pointing to ${tagName}`);
              } else {
                throw err;
              }
            }

            // Get all releases
            const { data: releases } = await github.rest.repos.listReleases({
              owner: context.repo.owner,
              repo: context.repo.repo,
              per_page: 100
            });

            // Filter stable and prerelease
            const stableReleases = releases.filter(r => !r.prerelease);
            const prereleases = releases.filter(r => r.prerelease);

            // Determine what 'latest' should point to:
            // 1. If stable releases exist → latest stable
            // 2. If no stable but prereleases exist → latest prerelease
            // 3. If no releases at all → unstable
            let latestTarget;

            if (stableReleases.length > 0) {
              // Sort stable by semver
              stableReleases.sort((a, b) => {
                const aVer = a.tag_name.replace('v', '').split('.').map(Number);
                const bVer = b.tag_name.replace('v', '').split('.').map(Number);
                for (let i = 0; i < 3; i++) {
                  if (aVer[i] !== bVer[i]) return bVer[i] - aVer[i];
                }
                return 0;
              });
              latestTarget = stableReleases[0];
              console.log(`Using latest stable: ${latestTarget.tag_name}`);
            } else if (prereleases.length > 0) {
              // Sort prereleases by semver
              prereleases.sort((a, b) => {
                const aVer = a.tag_name.replace('v', '').split('.').map(Number);
                const bVer = b.tag_name.replace('v', '').split('.').map(Number);
                for (let i = 0; i < 3; i++) {
                  if (aVer[i] !== bVer[i]) return bVer[i] - aVer[i];
                }
                return 0;
              });
              latestTarget = prereleases[0];
              console.log(`No stable releases, using latest pre-release: ${latestTarget.tag_name}`);
            } else {
              // No releases at all - fallback to unstable
              core.warning('No release builds are available, falling back to use image builds from unstable.');
              latestTarget = release;
              console.log('Falling back to unstable');
            }

            // Update 'latest' tag
            try {
              await github.rest.git.updateRef({
                owner: context.repo.owner,
                repo: context.repo.repo,
                ref: 'tags/latest',
                sha: latestTarget.target_commitish,
                force: true
              });
              console.log(`Updated 'latest' to ${latestTarget.tag_name || 'unstable'}`);
            } catch (err) {
              if (err.status === 422) {
                await github.rest.git.createRef({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  ref: 'refs/tags/latest',
                  sha: latestTarget.target_commitish
                });
                console.log(`Created 'latest' tag pointing to ${latestTarget.tag_name || 'unstable'}`);
              } else {
                throw err;
              }
            }
